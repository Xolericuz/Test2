<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XOLERIC NEO</title>
    
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href="data:application/manifest+json,{
        &quot;name&quot;: &quot;XOLERIC&quot;,
        &quot;short_name&quot;: &quot;XOLERIC&quot;,
        &quot;start_url&quot;: &quot;.&quot;,
        &quot;display&quot;: &quot;fullscreen&quot;,
        &quot;background_color&quot;: &quot;#050505&quot;,
        &quot;theme_color&quot;: &quot;#050505&quot;
    }">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none !important;
            -webkit-user-select: none !important;
            -webkit-touch-callout: none !important;
        }

        :root {
            --bg-deep: #050505;
            --bg-panel: #0c0c12;
            --bg-card: #14141c;
            --accent-gold: #FFB800;
            --accent-cyan: #00F0FF;
            --accent-glow: rgba(255, 184, 0, 0.25);
            --text-main: #ffffff;
            --text-muted: #9aa4bf;
            --border-light: rgba(255, 255, 255, 0.05);
            --font-size: 18px;
            --radius-xl: 32px;
            --radius-full: 60px;
        }

        body {
            background: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
            transition: filter 0.4s ease;
        }

        body.blur-mode {
            filter: blur(30px) grayscale(1);
            pointer-events: none;
        }

        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.3, 1);
            background: var(--bg-deep);
            display: flex;
            flex-direction: column;
        }

        /* Welcome Screen */
        #welcomeScreen {
            z-index: 1000;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 70% 30%, #1f1b0c 0%, #050505 90%);
        }

        #welcomeScreen.hide {
            opacity: 0;
            transform: scale(1.2);
            pointer-events: none;
        }

        .login-card {
            width: 88%;
            max-width: 380px;
            background: var(--bg-panel);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            padding: 44px 28px;
            text-align: center;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        .login-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), var(--accent-cyan), var(--accent-gold), transparent);
            filter: blur(2px);
        }

        .logo-big {
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #fff, #FFD966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .logo-small {
            color: var(--text-muted);
            font-size: 0.7rem;
            letter-spacing: 6px;
            margin-bottom: 48px;
        }

        .input-glass {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-full);
            padding: 18px 24px;
            color: white;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 24px;
            outline: none;
            backdrop-filter: blur(4px);
        }

        .input-glass:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-neon {
            background: linear-gradient(135deg, var(--accent-gold), #e5a500);
            border: none;
            border-radius: var(--radius-full);
            padding: 18px 24px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1.5px;
            color: #000;
            cursor: pointer;
            box-shadow: 0 12px 30px var(--accent-glow);
            transition: 0.2s;
            text-transform: uppercase;
        }

        .btn-neon:active {
            transform: scale(0.95);
            box-shadow: 0 6px 20px var(--accent-gold);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: var(--radius-full);
            padding: 18px 24px;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            backdrop-filter: blur(4px);
        }

        .btn-outline:active {
            background: rgba(255,255,255,0.05);
        }

        /* Main Screen */
        #mainScreen {
            transform: translateX(0);
        }

        #mainScreen.hide {
            transform: translateX(-100%);
        }

        .header {
            padding: 24px 24px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #ccc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .badge {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-full);
            padding: 8px 20px;
            font-weight: 600;
            color: var(--accent-gold);
        }

        .search-section {
            padding: 12px 24px 20px;
        }

        .search-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-full);
            padding: 16px 24px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            backdrop-filter: blur(4px);
        }

        .books-grid {
            flex: 1;
            overflow-y: auto;
            padding: 0 24px 100px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .book-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .book-card:active {
            transform: scale(0.98);
            border-color: var(--accent-gold);
        }

        .book-card.last-read {
            border-left: 4px solid var(--accent-gold);
        }

        .book-number {
            color: var(--text-muted);
            font-size: 0.75rem;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .book-title {
            font-size: 1.1rem;
            font-weight: 500;
            color: white;
        }

        .book-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-cyan);
            font-size: 1.2rem;
            border: 1px solid rgba(0,240,255,0.2);
        }

        /* Reader Screen */
        #readerScreen {
            transform: translateY(100%);
            z-index: 2000;
        }

        #readerScreen.show {
            transform: translateY(0);
        }

        .reader-header {
            position: absolute;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 600px;
            background: rgba(12,12,18,0.8);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-full);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 8px 8px 24px;
            z-index: 100;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .reader-title-small {
            font-size: 0.9rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 45%;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }

        .header-btn:active {
            background: var(--accent-gold);
            color: black;
        }

        /* Zoom Panel - ruletka style */
        .zoom-panel {
            position: absolute;
            top: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            width: 280px;
            background: rgba(12,12,18,0.9);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border-light);
            border-radius: 60px;
            padding: 24px;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .zoom-panel.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }

        .zoom-value {
            text-align: center;
            font-size: 2.8rem;
            font-weight: 300;
            color: var(--accent-gold);
            margin-bottom: 16px;
        }

        .zoom-slider {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
            outline: none;
        }

        .zoom-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: var(--accent-gold);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px var(--accent-gold);
        }

        .scroll-area {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .pull-indicator {
            position: absolute;
            top: -60px; left: 0; width: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 60px;
            color: var(--accent-cyan);
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 50;
        }

        .pull-line {
            width: 40px; height: 3px;
            background: var(--accent-cyan);
            border-radius: 3px;
            margin-bottom: 8px;
            box-shadow: 0 0 15px var(--accent-cyan);
        }

        .reader-content {
            padding: 120px 24px 100px;
            max-width: 720px;
            margin: 0 auto;
            font-size: var(--font-size);
            line-height: 1.8;
            color: #e0e4f0;
        }

        .reader-content h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, var(--accent-gold));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 48px;
            text-align: center;
        }

        .reader-content p {
            margin-bottom: 28px;
            text-align: justify;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 60px;
            padding: 14px 28px;
            color: white;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
        }

        .hide {
            display: none !important;
        }
    </style>
</head>
<body oncontextmenu="return false" onselectstart="return false" ondragstart="return false">

    <div id="welcomeScreen" class="screen">
        <div class="login-card">
            <div class="logo-big">XOLERIC</div>
            <div class="logo-small">NEO</div>
            <input type="text" id="userNameInput" class="input-glass" placeholder="Ismingiz" autocomplete="off">
            <div class="btn-group">
                <button class="btn-neon" id="startBtn">KIRISH</button>
                <button class="btn-outline" id="continueLastBtn">OXIRGI KITOB</button>
            </div>
        </div>
    </div>

    <div id="lastReadBanner" class="toast" id="lastReadToast">Oxirgi kitob yuklanmoqda...</div>

    <div id="mainScreen" class="screen hide">
        <div class="header">
            <div class="logo">XOLERIC</div>
            <div class="badge" id="displayUserName">MEHMAN</div>
        </div>
        <div class="search-section">
            <input type="text" id="searchInput" class="search-input" placeholder="Qidirish...">
        </div>
        <div class="books-grid" id="booksGrid"></div>
    </div>

    <div id="readerScreen" class="screen">
        <div class="reader-header">
            <div class="reader-title-small" id="readerTitle">Kitob</div>
            <div class="header-actions">
                <div class="header-btn" id="backBtn">←</div>
                <div class="header-btn" id="zoomBtn">Aa</div>
            </div>
        </div>

        <div class="zoom-panel" id="zoomPanel">
            <div class="zoom-value" id="zoomValue">18</div>
            <input type="range" class="zoom-slider" id="zoomSlider" min="14" max="36" value="18">
        </div>

        <div class="scroll-area" id="scrollArea">
            <div class="pull-indicator" id="pullIndicator">
                <div class="pull-line"></div>
                YOPISH
            </div>
            <div class="reader-content" id="readerContent">
                <h1 id="readTitle"></h1>
                <div id="readBody"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toastMessage"></div>

    <script>
        // ==================== TO'LIQ KITOBLAR ====================
        const BOOKS = [
            { id: 0, title: "1. Mukammallik Kuchi: Kichik Odatlar", 
              content: `<p>Hayotimizda yuz beradigan eng katta o'zgarishlar birdaniga bo'lmaydi. Katta yutuqlar har doim ko'zga ko'rinmas, doimiy ravishda takrorlanadigan kichik harakatlarning jamlanmasidir. "Atomic Habits" konsepsiyasi shuni uqtiradiki, inson o'z ustida har kuni atigi bir foiz (1%) yaxshilanishga erishsa, yil oxiriga kelib u 37 barobar kuchliroq, aqlliroq va tajribaliroq shaxsga aylanadi.</p><p>Aksariyat insonlar motivatsiyaga tayanib ish ko'radilar. Ammo motivatsiya bu vaqtinchalik hissiy holatdir. Haqiqiy va bardavom natijaga erishish uchun insonga motivatsiya emas, balki qat'iy intizom va to'g'ri ishlab chiqilgan tizim kerak.</p><p>Yangi odatni shakllantirish uchun psixologiyada maxsus zanjir mavjud: signal, istak, javob va mukofot. Yaxshi odatlarni shakllantirish uchun ularni ko'zga tashlanadigan, jozibador, bajarishga oson va qoniqarli qilish zarur.</p><p>Atrof-muhitingiz sizning xulq-atvoringizni belgilaydigan eng kuchli omildir. Agar diqqatni jamlashni istasangiz, ishlash xonangizdan chalg'ituvchi hamma narsani olib tashlang.</p>` },
            { id: 1, title: "2. Kiberxavfsizlik va Tarmoq", 
              content: `<p>Zamonaviy raqamli dunyoda eng qimmatli resurs bu — neft yoki oltin emas, balki axborot va ma'lumotlardir. Kiberxavfsizlik butun boshli tarmoq arxitekturasini, serverlar va foydalanuvchilar o'rtasidagi maxfiy ma'lumotlar almashinuvini himoya qilishning murakkab va uzluksiz ilmiy tizimidir.</p><p>Kiberhimoyaning asosi operatsion tizimlarning ichki tuzilishini chuqur tushunishdan boshlanadi. Tizimdagi ochiq portlar, zaif protokollar va kodlardagi kichik mantiqiy xatolar tajribali axloqiy xakerlar tomonidan doimiy ravishda tekshirilib boriladi.</p><p>Ma'lumotlar bazasiga inyeksiya hujumlari (SQLi), saytlararo skriptlash (XSS) va ijtimoiy muhandislik kabi usullar bugungi kundagi eng keng tarqalgan tahdidlardan hisoblanadi.</p><p>Shuning uchun ham axborot xavfsizligida eng zaif halqa bu kompyuter emas, insonning o'zidir. Kriptografiya, ya'ni ma'lumotlarni shifrlash san'ati ushbu sohaning yadrosidir.</p>` },
            { id: 2, title: "3. Moliyaviy Savodxonlik", 
              content: `<p>Boylikning haqiqiy o'lchovi bu sizning qancha ko'p pul topishingiz bilan emas, balki o'sha topilgan pulni qanday boshqarishingiz va uni kelajak uchun saqlab qola olishingiz bilan o'lchanadi.</p><p>Kambag'al va o'rta sinf insonlari o'zlariga asosan "passivlar" sotib olishadi va buni boylik deb o'ylashadi. Masalan, kreditga olingan qimmatbaho avtomobil, eng so'nggi rusumdagi telefon yoki hashamatli uy sizning cho'ntagingizdan har oy pul olib chiqib ketadi.</p><p>Murakkab foiz (compound interest) atamasi iqtisodiyotdagi sakkizinchi mo'jiza hisoblanadi. Agar siz yoshlikdan boshlab muntazam ravishda kichik summalarni sarmoya qilib borsangiz, yillar o'tib bu sarmoya o'zining foizlari hisobiga eksponensial tarzda o'sishni boshlaydi.</p>` },
            { id: 3, title: "4. Chuqur Diqqat: Fokus", 
              content: `<p>Hozirgi axborot texnologiyalari asrida chalg'ituvchi omillar shu qadar ko'pki, bitta vazifaga to'liq diqqatni jamlab ishlash noyob va o'ta qimmatbaho qobiliyatga aylanib bormoqda.</p><p>Aksariyat odamlar kunini elektron pochtalarga javob berish, ijtimoiy tarmoqlardagi tasmasini varaqlash va qisqa videolarni ko'rish bilan, ya'ni "yuzaki ishlar" bilan o'tkazadilar. Yuzaki ishlar odamga faqat bandlik hissini beradi, ammo iqtisodiy va shaxsiy jihatdan hech qanday katta qiymat yaratmaydi.</p><p>Inson miyasi ko'p vazifalilikni yoqtirmaydi. Bir vaqtning o'zida ham musiqa eshitish, ham xabar yozish, ham kitob o'qish aslo mumkin emas. Miya shunchaki bir vazifadan ikkinchisiga o'ta tezlik bilan sakraydi va bu jarayonda u juda ko'p energiya yo'qotadi.</p>` },
            { id: 4, title: "5. Kosmik Olam va Koinot", 
              content: `<p>Koinot shu qadar ulkan va sirli ki, inson aqli uning o'lchamlarini to'liq tasavvur qilishga ojizdir. Biz tungi osmonga boqib ko'radigan yulduzlarning nuri bizgacha yetib kelishi uchun yillar, hatto millionlab yillar kerak bo'ladi.</p><p>Koinotdagi eng qiziqarli va haligacha to'liq o'rganilmagan obyektlardan biri bu — qora tuynuklardir. Ular yulduzlar o'z hayotini yakunlab, ulkan portlashdan so'ng o'z ichiga qulab tushishi natijasida hosil bo'ladi.</p><p>Biz yashayotgan Quyosh tizimi Somon Yo'li galaktikasining faqatgina bitta kichik chekkasida joylashgan. Olimlarning kuzatishlariga ko'ra, koinotda yuz milliarddan ortiq galaktikalar mavjud.</p>` }
        ];

        // Qolgan kitoblar
        for (let i = 5; i < 50; i++) {
            BOOKS.push({
                id: i,
                title: `${i+1}. Kitob ${i+1}`,
                content: `<p>Bu ${i+1}-kitobning to'liq matni. Kutubxonada 50 ta kitob mavjud. Har bir kitob o'ziga xos mavzuga bag'ishlangan.</p><p>Kelajak texnologiyalari, psixologiya, falsafa va ilm-fan sohalarida bilim olishni davom eting.</p>`
            });
        }

        // ==================== STATE ====================
        const state = {
            user: localStorage.getItem('xoleric_user') || null,
            lastBook: localStorage.getItem('xoleric_lastBook') ? parseInt(localStorage.getItem('xoleric_lastBook')) : null,
            fontSize: 18,
            currentBook: null
        };

        // ==================== DOM ====================
        const dom = {
            welcome: document.getElementById('welcomeScreen'),
            main: document.getElementById('mainScreen'),
            reader: document.getElementById('readerScreen'),
            userNameInput: document.getElementById('userNameInput'),
            startBtn: document.getElementById('startBtn'),
            continueLastBtn: document.getElementById('continueLastBtn'),
            displayUserName: document.getElementById('displayUserName'),
            booksGrid: document.getElementById('booksGrid'),
            searchInput: document.getElementById('searchInput'),
            backBtn: document.getElementById('backBtn'),
            zoomBtn: document.getElementById('zoomBtn'),
            zoomPanel: document.getElementById('zoomPanel'),
            zoomSlider: document.getElementById('zoomSlider'),
            zoomValue: document.getElementById('zoomValue'),
            scrollArea: document.getElementById('scrollArea'),
            readTitle: document.getElementById('readTitle'),
            readBody: document.getElementById('readBody'),
            readerTitle: document.getElementById('readerTitle'),
            pullIndicator: document.getElementById('pullIndicator'),
            toast: document.getElementById('toastMessage')
        };

        // ==================== FULLSCREEN ====================
        async function enterFullscreen() {
            try {
                if (!document.fullscreenElement) {
                    if (document.documentElement.requestFullscreen) {
                        await document.documentElement.requestFullscreen();
                    } else if (document.documentElement.webkitRequestFullscreen) {
                        await document.documentElement.webkitRequestFullscreen();
                    }
                }
            } catch (e) {}
        }

        // ==================== TOAST ====================
        function showToast(msg, duration = 2000) {
            dom.toast.textContent = msg;
            dom.toast.classList.add('show');
            setTimeout(() => dom.toast.classList.remove('show'), duration);
        }

        // ==================== WELCOME HANDLER ====================
        if (state.user) {
            dom.displayUserName.textContent = state.user.toUpperCase();
        }

        // KIRISH tugmasi
        dom.startBtn.addEventListener('click', async () => {
            const name = dom.userNameInput.value.trim();
            if (name.length < 2) {
                showToast('Ismingizni kiriting');
                return;
            }
            state.user = name;
            localStorage.setItem('xoleric_user', name);
            dom.displayUserName.textContent = name.toUpperCase();
            
            await enterFullscreen();
            dom.welcome.classList.add('hide');
            dom.main.classList.remove('hide');
            renderLibrary();
        });

        // OXIRGI KITOB tugmasi
        dom.continueLastBtn.addEventListener('click', async () => {
            if (state.lastBook !== null && BOOKS[state.lastBook]) {
                await enterFullscreen();
                dom.welcome.classList.add('hide');
                openBook(BOOKS[state.lastBook]);
            } else {
                showToast('Oxirgi kitob topilmadi', 1500);
                if (state.user) {
                    await enterFullscreen();
                    dom.welcome.classList.add('hide');
                    dom.main.classList.remove('hide');
                    renderLibrary();
                } else {
                    showToast('Avval ismingizni kiriting', 1500);
                }
            }
        });

        // ==================== RENDER LIBRARY ====================
        function renderLibrary() {
            dom.booksGrid.innerHTML = '';
            BOOKS.forEach((book, index) => {
                const isLast = state.lastBook === book.id;
                const card = document.createElement('div');
                card.className = `book-card ${isLast ? 'last-read' : ''}`;
                card.innerHTML = `
                    <div style="flex:1">
                        <div class="book-number">KITOB ${String(index+1).padStart(2,'0')}</div>
                        <div class="book-title">${book.title.replace(/^\d+\.\s*/, '')}</div>
                    </div>
                    <div class="book-icon">${isLast ? '⟳' : '▶'}</div>
                `;
                card.onclick = () => openBook(book);
                dom.booksGrid.appendChild(card);
            });
        }

        // ==================== OPEN BOOK ====================
        async function openBook(book) {
            state.currentBook = book;
            state.lastBook = book.id;
            localStorage.setItem('xoleric_lastBook', book.id);
            
            dom.readTitle.textContent = book.title;
            dom.readBody.innerHTML = book.content;
            dom.readerTitle.textContent = book.title.length > 30 ? book.title.slice(0,27)+'...' : book.title;
            
            await enterFullscreen();
            dom.main.classList.add('hide');
            dom.reader.classList.add('show');
            dom.scrollArea.scrollTop = 0;
        }

        function closeBook() {
            dom.reader.classList.remove('show');
            dom.main.classList.remove('hide');
            renderLibrary();
        }

        dom.backBtn.addEventListener('click', closeBook);

        // ==================== ZOOM PANEL (RULETKA) ====================
        dom.zoomBtn.addEventListener('click', () => {
            dom.zoomPanel.classList.toggle('show');
        });

        dom.zoomSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            dom.zoomValue.textContent = val;
            document.documentElement.style.setProperty('--font-size', val + 'px');
        });

        document.addEventListener('click', (e) => {
            if (!dom.zoomPanel.contains(e.target) && e.target !== dom.zoomBtn) {
                dom.zoomPanel.classList.remove('show');
            }
        });

        // ==================== PULL TO CLOSE ====================
        let touchStartY = 0;
        let isAtTop = false;

        dom.scrollArea.addEventListener('touchstart', (e) => {
            if (dom.scrollArea.scrollTop <= 0) {
                touchStartY = e.touches[0].clientY;
                isAtTop = true;
            } else isAtTop = false;
        }, {passive: true});

        dom.scrollArea.addEventListener('touchmove', (e) => {
            if (isAtTop && touchStartY > 0) {
                let deltaY = e.touches[0].clientY - touchStartY;
                if (deltaY > 15) {
                    dom.pullIndicator.style.opacity = Math.min(deltaY/100, 0.8);
                    dom.pullIndicator.style.transform = `translateY(${Math.min(deltaY/1.5, 50)}px)`;
                }
                if (deltaY > 100) {
                    closeBook();
                    touchStartY = 0;
                    dom.pullIndicator.style.opacity = 0;
                    dom.pullIndicator.style.transform = 'translateY(0)';
                }
            }
        }, {passive: true});

        dom.scrollArea.addEventListener('touchend', () => {
            touchStartY = 0;
            dom.pullIndicator.style.opacity = 0;
            dom.pullIndicator.style.transform = 'translateY(0)';
        });

        dom.scrollArea.addEventListener('wheel', (e) => {
            if (dom.scrollArea.scrollTop <= 0 && e.deltaY < -30) closeBook();
        });

        // ==================== SECURITY ====================
        window.addEventListener('blur', () => document.body.classList.add('blur-mode'));
        window.addEventListener('focus', () => document.body.classList.remove('blur-mode'));
        
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.key === 'F12' || e.key === 'PrintScreen') {
                e.preventDefault(); return false;
            }
        });

        // ==================== SEARCH ====================
        dom.searchInput.addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = BOOKS.filter(b => b.title.toLowerCase().includes(q));
            dom.booksGrid.innerHTML = '';
            filtered.forEach(book => {
                const card = document.createElement('div');
                card.className = 'book-card';
                card.innerHTML = `
                    <div style="flex:1">
                        <div class="book-number">KITOB ${String(book.id+1).padStart(2,'0')}</div>
                        <div class="book-title">${book.title.replace(/^\d+\.\s*/, '')}</div>
                    </div>
                    <div class="book-icon">▶</div>
                `;
                card.onclick = () => openBook(book);
                dom.booksGrid.appendChild(card);
            });
        });

        // Initial render
        renderLibrary();
    </script>
</body>
</html>
